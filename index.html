<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সবখবর - নিউজ পোর্টাল</title>
    <style>
        body { font-family: sans-serif; background: #eee; margin: 0; padding: 20px; }
        .section { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        h1 { text-align: center; color: #1a237e; }
        .news-item { border-bottom: 1px solid #ddd; padding: 10px 0; }
        .news-item a { text-decoration: none; color: #333; font-weight: bold; }
        .source { color: #d32f2f; font-size: 12px; }
    </style>
</head>
<body>
    <h1>সবখবর ডট কম</h1>
    
    <div class="section">
        <h2>🇧🇩 বাংলা খবর</h2>
        <div id="bangla-news">লোডিং...</div>
    </div>

    <div class="section">
        <h2>🇺🇸 ইংরেজি খবর</h2>
        <div id="english-news">লোডিং...</div>
    </div>

    <script>
        fetch('news.json')
            .then(res => res.json())
            .then(data => {
                const bDiv = document.getElementById('bangla-news');
                const eDiv = document.getElementById('english-news');
                
                bDiv.innerHTML = data.bangla.map(n => `
                    <div class="news-item">
                        <span class="source">[${n.source}]</span><br>
                        <a href="${n.link}" target="_blank">${n.title}</a>
                    </div>`).join('');

                eDiv.innerHTML = data.english.map(n => `
                    <div class="news-item">
                        <span class="source">[${n.source}]</span><br>
                        <a href="${n.link}" target="_blank">${n.title}</a>
                    </div>`).join('');
            });
    </script>
</body>
</html>
